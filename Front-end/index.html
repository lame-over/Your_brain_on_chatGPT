    <script>
var autoLayout10 = document.getElementById("autoLayout10");
if (autoLayout10) {
  autoLayout10.addEventListener("click", function (e) {
    // Please sync "Auto layout" to the project
  });
}
// Початковий час (момент завантаження сторінки)
const startTime = Date.now();

function updateSessionTime() {
    const counterElement = document.getElementById('session-counter');
    if (!counterElement) return;

    // Рахуємо різницю в мілісекундах
    const currentTime = Date.now();
    const elapsedMilliseconds = currentTime - startTime;

    // Перетворюємо в години, хвилини та секунди
    const totalSeconds = Math.floor(elapsedMilliseconds / 1000);
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    // Форматуємо, щоб завжди було дві цифри (наприклад, 01:05:09)
    const formattedTime = 
        String(hours).padStart(2, '0') + ":" + 
        String(minutes).padStart(2, '0') + ":" + 
        String(seconds).padStart(2, '0');

    // Оновлюємо текст на сторінці
    counterElement.textContent = formattedTime;
}

// Запускаємо оновлення кожну секунду
setInterval(updateSessionTime, 1000);

// Викликаємо один раз відразу, щоб не чекати першу секунду з 00:00:00
updateSessionTime();
      </script>
      <script src="js/transitions.js"></script>
